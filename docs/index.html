<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公务员考试 · 政治理论刷题</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #f0f2f5;
            color: #333;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
        }
        .header h1 { font-size: 22px; font-weight: 600; }
        .header .subtitle { font-size: 13px; opacity: 0.85; margin-top: 4px; }
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 12px;
            font-size: 14px;
        }
        .stats-bar .stat {
            background: rgba(255,255,255,0.2);
            padding: 4px 14px;
            border-radius: 20px;
        }
        .reset-btn {
            background: rgba(255,255,255,0.25);
            border: 1.5px solid rgba(255,255,255,0.6);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-left: 8px;
        }
        .reset-btn:hover { background: rgba(255,255,255,0.4); }
        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 20px 16px 80px;
        }
        /* Navigation */
        .nav-panel {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .nav-panel h3 { font-size: 15px; margin-bottom: 10px; color: #555; }
        .source-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 8px;
        }
        .source-btn {
            padding: 10px 14px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-size: 13px;
            text-align: center;
            transition: all 0.2s;
            position: relative;
        }
        .source-btn:hover { border-color: #667eea; color: #667eea; }
        .source-btn.active { background: #667eea; color: white; border-color: #667eea; }
        .source-btn .count { font-size: 11px; color: #888; margin-left: 4px; }
        .source-btn.active .count { color: rgba(255,255,255,0.8); }
        .source-btn .badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #ff4757;
            color: white;
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 10px;
        }
        .source-btn .badge.done { background: #2ed573; }
        /* Question Card */
        .question-card {
            background: white;
            border-radius: 12px;
            padding: 24px 20px;
            margin-bottom: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .q-number {
            font-size: 12px;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .q-topic {
            display: inline-block;
            background: #f0f0ff;
            color: #667eea;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
            margin-left: 8px;
        }
        .q-source {
            display: inline-block;
            background: #e8f5e9;
            color: #2e7d32;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
            margin-left: 4px;
        }
        .q-type {
            display: inline-block;
            background: #fff3e0;
            color: #e67e22;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
            margin-left: 4px;
        }
        .q-text {
            font-size: 16px;
            line-height: 1.7;
            margin-bottom: 20px;
            font-weight: 500;
        }
        .q-blank {
            display: inline-block;
            min-width: 80px;
            border-bottom: 2px solid #667eea;
            margin: 0 4px;
            text-align: center;
            color: #667eea;
            font-weight: 600;
        }
        /* Options */
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option {
            display: flex;
            align-items: flex-start;
            padding: 14px 16px;
            border: 1.5px solid #e8e8e8;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 15px;
            line-height: 1.5;
        }
        .option:hover { border-color: #667eea; background: #f8f9ff; }
        .option .opt-label {
            flex-shrink: 0;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            margin-right: 12px;
            margin-top: 1px;
            transition: all 0.2s;
        }
        .option:hover .opt-label { background: #e8eaff; color: #667eea; }
        .option.selected { border-color: #667eea; background: #f0f2ff; }
        .option.selected .opt-label { background: #667eea; color: white; }
        .option.correct { border-color: #2ed573; background: #f0fff4; }
        .option.correct .opt-label { background: #2ed573; color: white; }
        .option.wrong { border-color: #ff4757; background: #fff5f5; }
        .option.wrong .opt-label { background: #ff4757; color: white; }
        .option.disabled { pointer-events: none; }
        /* Explanation */
        .explanation {
            margin-top: 16px;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
            font-size: 14px;
            line-height: 1.7;
            color: #555;
            display: none;
        }
        .explanation.show { display: block; animation: fadeIn 0.3s ease; }
        .explanation strong { color: #667eea; }
        .explanation .trap { color: #ff4757; font-weight: 600; }
        /* Buttons */
        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5a6fd6; }
        .btn-secondary { background: #f0f0f0; color: #555; }
        .btn-secondary:hover { background: #e0e0e0; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        /* Mode selector */
        .mode-selector {
            display: flex;
            background: white;
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .mode-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            color: #888;
            transition: all 0.2s;
        }
        .mode-btn.active { background: #667eea; color: white; }
        /* Progress */
        .progress-bar {
            height: 4px;
            background: #e8e8e8;
            border-radius: 2px;
            margin-bottom: 16px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 2px;
            transition: width 0.3s ease;
        }
        /* Result panel */
        .result-panel {
            background: white;
            border-radius: 12px;
            padding: 32px 20px;
            text-align: center;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            display: none;
        }
        .result-panel.show { display: block; }
        .result-score {
            font-size: 48px;
            font-weight: 700;
            color: #667eea;
        }
        .result-label { font-size: 14px; color: #888; margin-top: 4px; }
        .result-detail {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-top: 20px;
        }
        .result-item { text-align: center; }
        .result-item .num { font-size: 24px; font-weight: 600; }
        .result-item .num.green { color: #2ed573; }
        .result-item .num.red { color: #ff4757; }
        .result-item .label { font-size: 12px; color: #888; }
        /* Fill blank input */
        .fill-input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #e8e8e8;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .fill-input:focus { border-color: #667eea; }
        .fill-input.correct { border-color: #2ed573; background: #f0fff4; }
        .fill-input.wrong { border-color: #ff4757; background: #fff5f5; }
        .correct-answer {
            margin-top: 8px;
            font-size: 14px;
            color: #2ed573;
            font-weight: 600;
            display: none;
        }
        .correct-answer.show { display: block; }
        /* Responsive */
        @media (max-width: 480px) {
            .header h1 { font-size: 18px; }
            .q-text { font-size: 15px; }
            .source-grid { grid-template-columns: repeat(2, 1fr); }
        }
        /* Hidden */
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="header">
    <h1>📚 公务员考试 · 政治理论刷题</h1>
    <div class="subtitle" id="headerSubtitle">政治理论练习题库</div>
    <div class="stats-bar">
        <div class="stat">✅ 正确 <span id="stat-correct">0</span></div>
        <div class="stat">❌ 错误 <span id="stat-wrong">0</span></div>
        <div class="stat">📝 已做 <span id="stat-done">0</span>/<span id="stat-total">0</span></div>
    </div>
    <div style="margin-top:8px">
        <button class="reset-btn" onclick="restartQuiz()">🔄 重置所有记录</button>
    </div>
</div>

<div class="container">
    <!-- Mode Selector -->
    <div class="mode-selector">
        <button class="mode-btn active" onclick="setMode('all')">全部题目</button>
        <button class="mode-btn" onclick="setMode('choice')">选择题</button>
        <button class="mode-btn" onclick="setMode('fill')">填空题</button>
        <button class="mode-btn" onclick="setMode('wrong')">错题回顾</button>
    </div>

    <!-- Source Navigation -->
    <div class="nav-panel">
        <h3>📂 按讲义练习</h3>
        <div class="source-grid" id="sourceGrid"></div>
    </div>

    <!-- Progress -->
    <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>

    <!-- Question Area -->
    <div id="questionArea"></div>

    <!-- Result Panel -->
    <div class="result-panel" id="resultPanel">
        <div class="result-score" id="resultScore">0%</div>
        <div class="result-label">正确率</div>
        <div class="result-detail">
            <div class="result-item">
                <div class="num green" id="resultCorrect">0</div>
                <div class="label">正确</div>
            </div>
            <div class="result-item">
                <div class="num red" id="resultWrong">0</div>
                <div class="label">错误</div>
            </div>
            <div class="result-item">
                <div class="num" id="resultTotal">0</div>
                <div class="label">总计</div>
            </div>
        </div>
        <div class="btn-row" style="margin-top:24px">
            <button class="btn btn-secondary" onclick="reviewWrong()">查看错题</button>
            <button class="btn btn-primary" onclick="restartQuiz()">重新练习</button>
        </div>
    </div>
</div>

<script>
// ===================== QUESTION BANK =====================
const QUESTIONS = [
    // ===== 讲义1 · 共产主义与社会主义 =====
    {
        id: 1,
        source: "讲义1",
        topic: "共产主义与社会主义",
        type: "choice",
        question: "以下哪项不属于共产主义社会的基本特征？",
        options: [
            "生产力高度发展，物质财富极其丰富",
            "按劳分配，多劳多得",
            "纯公有制，没有私有制",
            "按需分配，劳动成为生活的第一需要"
        ],
        answer: 1,
        explanation: "共产主义社会实行<strong>按需分配</strong>，而非按劳分配。按劳分配是社会主义阶段的分配方式。共产主义阶段生产力高度发展，物质财富极其丰富，实行纯公有制，劳动不再是谋生手段而是生活的第一需要。"
    },
    {
        id: 2,
        source: "讲义1",
        topic: "共产主义与社会主义",
        type: "choice",
        question: "社会主义与共产主义的关系是：",
        options: [
            "社会主义是共产主义的初级阶段",
            "社会主义是共产主义的高级阶段",
            "社会主义和共产主义是两种独立的社会形态",
            "社会主义是资本主义的过渡阶段，与共产主义无关"
        ],
        answer: 0,
        explanation: "社会主义是共产主义的<strong>初级阶段</strong>（或称第一阶段）。共产主义社会分为两个阶段：初级阶段即社会主义，高级阶段才是完全意义上的共产主义。"
    },
    {
        id: 3,
        source: "讲义1",
        topic: "共产主义与社会主义",
        type: "fill",
        question: "共产主义社会实行____制，没有私有制。",
        answer: "公有",
        explanation: "共产主义社会的基本特征之一是实行<strong>纯公有制</strong>，彻底消灭私有制。"
    },
    {
        id: 4,
        source: "讲义1",
        topic: "共产主义与社会主义",
        type: "fill",
        question: "共产主义社会的分配方式是____分配。",
        answer: "按需",
        explanation: "共产主义社会生产力高度发达，物质财富极其丰富，实行<strong>按需分配</strong>。社会主义阶段实行按劳分配。"
    },

    // ===== 讲义1 · 共同富裕 =====
    {
        id: 5,
        source: "讲义1",
        topic: "共同富裕",
        type: "choice",
        question: "关于共同富裕，以下说法正确的是：",
        options: [
            "共同富裕就是同步富裕，所有人同时达到富裕",
            "共同富裕就是同等富裕，所有人富裕程度相同",
            "共同富裕允许一部分人先富起来，先富带动后富",
            "共同富裕就是平均主义，消灭一切收入差距"
        ],
        answer: 2,
        explanation: "共同富裕<strong>不是同步富裕、同等富裕</strong>（这是常见挖坑点！）。共同富裕允许一部分地区、一部分人先富起来，然后先富带动后富，最终实现共同富裕。它不等于平均主义。"
    },
    {
        id: 6,
        source: "讲义1",
        topic: "共同富裕",
        type: "choice",
        question: "以下关于共同富裕的说法，属于常见错误（\"挖坑\"）的是：",
        options: [
            "共同富裕是社会主义的本质要求",
            "共同富裕就是同等富裕、同步富裕",
            "共同富裕是一个长期的历史过程",
            "共同富裕要防止两极分化"
        ],
        answer: 1,
        explanation: "<span class='trap'>挖坑警告：</span>\"同等富裕\"\"同步富裕\"是考试中常见的错误表述。共同富裕允许有先有后、有快有慢，最终达到共同富裕，但不是所有人同时、同等程度地富裕。"
    },
    {
        id: 7,
        source: "讲义1",
        topic: "共同富裕",
        type: "fill",
        question: "社会主义的本质是解放生产力，发展生产力，消灭剥削，消除两极分化，最终达到____。",
        answer: "共同富裕",
        explanation: "邓小平提出社会主义本质论：解放生产力，发展生产力，消灭剥削，消除两极分化，最终达到<strong>共同富裕</strong>。"
    },

    // ===== 讲义1 · 新时代主要矛盾 =====
    {
        id: 8,
        source: "讲义1",
        topic: "新时代主要矛盾",
        type: "choice",
        question: "中国特色社会主义进入新时代后，我国社会主要矛盾转化为：",
        options: [
            "人民日益增长的美好生活需要和不平衡不充分的发展之间的矛盾",
            "人民日益增长的物质文化需要同落后的社会生产之间的矛盾",
            "先进的社会制度同落后的社会生产力之间的矛盾",
            "人民对于经济文化迅速发展的需要同当前经济文化不能满足人民需要的状况之间的矛盾"
        ],
        answer: 0,
        explanation: "2017年<strong>十九大</strong>提出，新时代我国社会主要矛盾已经转化为<strong>人民日益增长的美好生活需要和不平衡不充分的发展之间的矛盾</strong>。之前的表述（1981年十一届六中全会）是\"人民日益增长的物质文化需要同落后的社会生产之间的矛盾\"。"
    },
    {
        id: 9,
        source: "讲义1",
        topic: "新时代主要矛盾",
        type: "choice",
        question: "我国社会主要矛盾的转化是在哪次大会上提出的？",
        options: [
            "党的十八大（2012年）",
            "党的十八届三中全会（2013年）",
            "党的十九大（2017年）",
            "党的二十大（2022年）"
        ],
        answer: 2,
        explanation: "2017年<strong>党的十九大</strong>首次提出新时代我国社会主要矛盾的转化。注意区分：2012年十八大开创了中国特色社会主义新时代，但主要矛盾的转化是在2017年十九大提出的。"
    },
    {
        id: 10,
        source: "讲义1",
        topic: "新时代主要矛盾",
        type: "choice",
        question: "关于新时代我国社会主要矛盾变化后，以下说法正确的是：",
        options: [
            "我国已经不再是发展中国家",
            "我国的基本国情和国际地位没有变",
            "我国已经超越了社会主义初级阶段",
            "我国已经不是世界上最大的发展中国家"
        ],
        answer: 1,
        explanation: "虽然社会主要矛盾发生了转化，但我国的<strong>基本国情没有变</strong>（仍处于并将长期处于社会主义初级阶段），<strong>国际地位没有变</strong>（仍是世界上最大的发展中国家）。这是\"两个没有变\"。"
    },
    {
        id: 11,
        source: "讲义1",
        topic: "新时代主要矛盾",
        type: "fill",
        question: "党的十八大（____年）开创了中国特色社会主义新时代。",
        answer: "2012",
        explanation: "<strong>2012年</strong>党的十八大开创了中国特色社会主义新时代。注意与2017年十九大（提出主要矛盾转化）区分。"
    },

    // ===== 讲义1 · 两个结合 =====
    {
        id: 12,
        source: "讲义1",
        topic: "两个结合",
        type: "choice",
        question: "马克思主义中国化的\"第一个结合\"是由谁在何时提出的？",
        options: [
            "刘少奇，1945年七大",
            "邓小平，1978年十一届三中全会",
            "毛泽东，1938年六届六中全会",
            "习近平，2021年建党百年大会"
        ],
        answer: 2,
        explanation: "1938年，<strong>毛泽东</strong>在党的<strong>六届六中全会</strong>上首次提出\"马克思主义中国化\"的命题，这就是\"第一个结合\"——把马克思主义基本原理同中国具体实际相结合。"
    },
    {
        id: 13,
        source: "讲义1",
        topic: "两个结合",
        type: "choice",
        question: "\"第二个结合\"是指把马克思主义基本原理同什么相结合？",
        options: [
            "中国具体实际",
            "中国革命实践",
            "中国特色社会主义理论",
            "中华优秀传统文化"
        ],
        answer: 3,
        explanation: "<strong>\"第二个结合\"</strong>是指把马克思主义基本原理同<strong>中华优秀传统文化</strong>相结合。这是在习近平文化传承发展座谈会上的讲话中重点阐述的。第一个结合是同中国具体实际相结合。"
    },
    {
        id: 14,
        source: "讲义1",

// ===================== APP STATE =====================
let state = {
    mode: 'all',           // all, choice, fill, wrong
    activeSource: null,    // null = all sources, "讲义1", "测试"
    currentIndex: 0,
    questions: [],         // current filtered questions
    answered: {},          // { questionId: { correct: bool, userAnswer: any } }
    wrongIds: new Set(),
    correctCount: 0,
    wrongCount: 0,
};

// Load progress from localStorage
function loadProgress() {
    try {
        const saved = localStorage.getItem('quiz_progress');
        if (saved) {
            const data = JSON.parse(saved);
            state.answered = data.answered || {};
            state.wrongIds = new Set(data.wrongIds || []);
            state.correctCount = data.correctCount || 0;
            state.wrongCount = data.wrongCount || 0;
        }
    } catch(e) {}
}

function saveProgress() {
    try {
        localStorage.setItem('quiz_progress', JSON.stringify({
            answered: state.answered,
            wrongIds: [...state.wrongIds],
            correctCount: state.correctCount,
            wrongCount: state.wrongCount,
        }));
    } catch(e) {}
}

// ===================== SOURCES =====================
function getSources() {
    const sources = [...new Set(QUESTIONS.map(q => q.source))];
    // Ensure "测试" is always listed even if empty
    if (!sources.includes("测试")) {
        sources.push("测试");
    }
    return sources;
}

function renderSourceGrid() {
    const grid = document.getElementById('sourceGrid');
    const sources = getSources();
    grid.innerHTML = `<button class="source-btn ${!state.activeSource ? 'active' : ''}" onclick="selectSource(null)">
        全部讲义 <span class="count">(${QUESTIONS.length})</span>
    </button>`;
    sources.forEach(source => {
        const count = QUESTIONS.filter(q => q.source === source).length;
        const doneCount = QUESTIONS.filter(q => q.source === source && state.answered[q.id]).length;
        const isActive = state.activeSource === source;
        const isDone = doneCount === count && count > 0;
        grid.innerHTML += `<button class="source-btn ${isActive ? 'active' : ''}" onclick="selectSource('${source}')">
            ${source} <span class="count">(${doneCount}/${count})</span>
            ${isDone ? '<span class="badge done">✓</span>' : ''}
        </button>`;
    });
}

function selectSource(source) {
    state.activeSource = source;
    state.currentIndex = 0;
    filterQuestions();
    renderSourceGrid();
    renderQuestion();
}

// ===================== FILTER =====================
function filterQuestions() {
    let qs = [...QUESTIONS];
    if (state.activeSource) {
        qs = qs.filter(q => q.source === state.activeSource);
    }
    if (state.mode === 'choice') {
        qs = qs.filter(q => q.type === 'choice');
    } else if (state.mode === 'fill') {
        qs = qs.filter(q => q.type === 'fill');
    } else if (state.mode === 'wrong') {
        qs = qs.filter(q => state.wrongIds.has(q.id));
    }
    state.questions = qs;
    document.getElementById('stat-total').textContent = qs.length;
}

function setMode(mode) {
    state.mode = mode;
    state.currentIndex = 0;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    filterQuestions();
    renderQuestion();
}

// ===================== RENDER =====================
function renderQuestion() {
    const area = document.getElementById('questionArea');
    const result = document.getElementById('resultPanel');
    result.classList.remove('show');

    if (state.questions.length === 0) {
        area.innerHTML = `<div class="question-card" style="text-align:center;padding:48px 20px">
            <div style="font-size:48px;margin-bottom:16px">${state.mode === 'wrong' ? '🎉' : '📭'}</div>
            <div style="font-size:16px;color:#888">${state.mode === 'wrong' ? '没有错题，继续保持！' : (state.activeSource === '测试' ? '暂无题目，等待添加新讲义' : '暂无题目')}</div>
        </div>`;
        updateProgress();
        return;
    }

    if (state.currentIndex >= state.questions.length) {
        showResult();
        return;
    }

    const q = state.questions[state.currentIndex];
    const isAnswered = state.answered[q.id];
    const labels = ['A', 'B', 'C', 'D'];

    let html = `<div class="question-card">
        <div class="q-number">
            第 ${state.currentIndex + 1} / ${state.questions.length} 题
            <span class="q-topic">${q.topic}</span>
            <span class="q-source">${q.source}</span>
            <span class="q-type">${q.type === 'choice' ? '选择题' : '填空题'}</span>
        </div>
        <div class="q-text">${formatQuestion(q)}</div>`;

    if (q.type === 'choice') {
        html += `<div class="options">`;
        q.options.forEach((opt, i) => {
            let cls = '';
            if (isAnswered) {
                cls = 'disabled';
                if (i === q.answer) cls += ' correct';
                else if (i === isAnswered.userAnswer) cls += ' wrong';
            }
            html += `<div class="option ${cls}" onclick="selectOption(${q.id}, ${i})">
                <div class="opt-label">${labels[i]}</div>
                <div>${opt}</div>
            </div>`;
        });
        html += `</div>`;
    } else {
        // Fill in the blank
        html += `<div style="position:relative">
            <input type="text" class="fill-input ${isAnswered ? (isAnswered.correct ? 'correct' : 'wrong') : ''}"
                   id="fillInput" placeholder="请输入答案..."
                   ${isAnswered ? `value="${isAnswered.userAnswer}" disabled` : ''}
                   onkeydown="if(event.key==='Enter')submitFill(${q.id})">
            <div class="correct-answer ${isAnswered && !isAnswered.correct ? 'show' : ''}" id="correctAnswer">
                正确答案：${q.answer}
            </div>
        </div>`;
        if (!isAnswered) {
            html += `<div class="btn-row">
                <button class="btn btn-primary" onclick="submitFill(${q.id})">提交答案</button>
            </div>`;
        }
    }

    // Explanation
    if (isAnswered) {
        html += `<div class="explanation show">${q.explanation}</div>`;
    }

    // Navigation buttons
    html += `<div class="btn-row" style="margin-top:16px">
        <button class="btn btn-secondary" ${state.currentIndex === 0 ? 'disabled' : ''} onclick="prevQuestion()">上一题</button>
        <button class="btn btn-primary" onclick="nextQuestion()">${state.currentIndex >= state.questions.length - 1 ? '查看结果' : '下一题'}</button>
    </div>`;

    html += `</div>`;
    area.innerHTML = html;
    updateProgress();
}

function formatQuestion(q) {
    if (q.type === 'fill') {
        return q.question.replace('____', '<span class="q-blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>');
    }
    return q.question;
}

function selectOption(qId, optIndex) {
    const q = QUESTIONS.find(x => x.id === qId);
    if (!q || state.answered[qId]) return;

    const isCorrect = optIndex === q.answer;
    state.answered[qId] = { correct: isCorrect, userAnswer: optIndex };
    if (isCorrect) {
        state.correctCount++;
        state.wrongIds.delete(qId);
    } else {
        state.wrongCount++;
        state.wrongIds.add(qId);
    }
    saveProgress();
    updateStats();
    renderQuestion();
}

function submitFill(qId) {
    const input = document.getElementById('fillInput');
    if (!input) return;
    const userAnswer = input.value.trim();
    if (!userAnswer) return;

    const q = QUESTIONS.find(x => x.id === qId);
    if (!q || state.answered[qId]) return;

    // Check answer (support multiple answers separated by comma)
    const answers = q.answer.split(',').map(a => a.trim());
    const isCorrect = answers.some(a => userAnswer === a || userAnswer.includes(a));

    state.answered[qId] = { correct: isCorrect, userAnswer };
    if (isCorrect) {
        state.correctCount++;
        state.wrongIds.delete(qId);
    } else {
        state.wrongCount++;
        state.wrongIds.add(qId);
    }
    saveProgress();
    updateStats();
    renderQuestion();
}

function prevQuestion() {
    if (state.currentIndex > 0) {
        state.currentIndex--;
        renderQuestion();
    }
}

function nextQuestion() {
    if (state.currentIndex < state.questions.length - 1) {
        state.currentIndex++;
        renderQuestion();
    } else {
        showResult();
    }
}

// ===================== PROGRESS & STATS =====================
function updateProgress() {
    const total = state.questions.length;
    const done = state.questions.filter(q => state.answered[q.id]).length;
    const pct = total > 0 ? (done / total * 100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
}

function updateStats() {
    document.getElementById('stat-correct').textContent = state.correctCount;
    document.getElementById('stat-wrong').textContent = state.wrongCount;
    const done = Object.keys(state.answered).length;
    document.getElementById('stat-done').textContent = done;
    document.getElementById('stat-total').textContent = QUESTIONS.length;
    renderSourceGrid();
}

// ===================== RESULT =====================
function showResult() {
    const area = document.getElementById('questionArea');
    area.innerHTML = '';
    const panel = document.getElementById('resultPanel');
    panel.classList.add('show');

    const doneQs = state.questions.filter(q => state.answered[q.id]);
    const correctQs = doneQs.filter(q => state.answered[q.id].correct);
    const pct = doneQs.length > 0 ? Math.round(correctQs.length / doneQs.length * 100) : 0;

    document.getElementById('resultScore').textContent = pct + '%';
    document.getElementById('resultCorrect').textContent = correctQs.length;
    document.getElementById('resultWrong').textContent = doneQs.length - correctQs.length;
    document.getElementById('resultTotal').textContent = doneQs.length;
}

function reviewWrong() {
    state.mode = 'wrong';
    state.currentIndex = 0;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.mode-btn')[3].classList.add('active');
    filterQuestions();
    renderQuestion();
}

function restartQuiz() {
    if (confirm('确定要重置所有做题记录吗？')) {
        state.answered = {};
        state.wrongIds = new Set();
        state.correctCount = 0;
        state.wrongCount = 0;
        state.currentIndex = 0;
        saveProgress();
        updateStats();
        filterQuestions();
        renderQuestion();
    }
}

// ===================== INIT =====================
function init() {
    loadProgress();
    filterQuestions();
    renderSourceGrid();
    updateStats();
    renderQuestion();
}

init();
</script>

</html>
